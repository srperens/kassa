services:
  kassa:
    build: .
    image: kassa:latest
    container_name: kassa
    restart: unless-stopped
    ports:
      # Host port 3001 -> container port 3000. Change the left side if 3000 is
      # already taken on the host.
      - "3001:3000"
    environment:
      # Set KASSA_TOKENS in a .env file next to this compose file.
      - KASSA_TOKENS=${KASSA_TOKENS:?set KASSA_TOKENS in .env}
      # Optional read-only "view" keys (see .env.example). Empty if unset.
      - KASSA_VIEW_TOKENS=${KASSA_VIEW_TOKENS:-}
      - KASSA_DB=/data/kassa.sqlite
    volumes:
      - kassa-data:/data

volumes:
  kassa-data:
